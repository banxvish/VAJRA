# ============================================================
# KAVACHA AI Voice Defense Engine — Master Configuration
# ============================================================
# All hyperparameters are centralized here. No hardcoding.

seed: 42

# ---- Audio I/O ----
audio:
  sample_rate: 16000
  duration: 2               # seconds
  target_length: 32000       # sample_rate × duration

# ---- Mel-spectrogram parameters ----
spectrogram:
  n_mels: 128
  n_fft: 1024
  hop_length: 512
  f_min: 20
  f_max: 8000
  image_size: 128            # final H = W = 128

# ---- Data augmentation ----
augmentation:
  gaussian_noise_std: 0.005
  pitch_shift_semitones: 2
  time_stretch_rates: [0.9, 1.1]
  reverb_delay_ms: 20
  reverb_decay: 0.4
  bg_noise_snr_db: 15
  apply_to_real_only: true

# ---- DataLoader ----
dataloader:
  num_workers: 4
  pin_memory: true
  persistent_workers: true

# ---- Spectrogram model (EfficientNet-B0) training ----
training:
  batch_size: 32

  # Stage 1 — classifier head only (backbone frozen)
  epochs_stage1: 10
  # Stage 2 — fine-tune backbone
  epochs_stage2: 5

  optimizer:
    lr_stage1: 1.0e-4
    lr_stage2: 1.0e-5
    weight_decay: 1.0e-4

  scheduler:
    T_max_stage1: 10
    T_max_stage2: 5

  early_stopping:
    patience: 5
    min_delta: 0.0

  dropout: 0.3
  hidden_dim: 512
  num_classes: 2
  gradient_clip_norm: 1.0

# ---- Wav2Vec2 pretrained deepfake detector ----
# Uses a fully pretrained classification model — NO training required.
wav2vec:
  model_name: "superb/wav2vec2-base-superb-sid"
  lr_stage1: 3.0e-4
  lr_stage2: 3.0e-5
  epochs_stage1: 10
  epochs_stage2: 5
  batch_size: 16
  num_classes: 2
  dropout: 0.3
  hidden_dim: 256
  unfreeze_last_n_layers: 4
  gradient_clip_norm: 1.0

  early_stopping:
    patience: 5
    min_delta: 0.0

# ---- Codec artifact detector (1D CNN) ----
codec_training:
  batch_size: 64
  epochs: 15
  lr: 3.0e-4
  weight_decay: 1.0e-4
  num_classes: 3
  gradient_clip_norm: 1.0

  early_stopping:
    patience: 5
    min_delta: 0.0

# ---- Speaker verification (ECAPA-TDNN) ----
speaker_verification:
  model_source: "speechbrain/spkrec-ecapa-voxceleb"
  embedding_dim: 192
  similarity_threshold: 0.25

# ---- Ensemble trust score weights ----
ensemble:
  spectrogram_weight: 0.4
  wav2vec_weight: 0.4
  codec_weight: 0.15
  speaker_weight: 0.05
  thresholds:
    safe: 0.7
    suspicious: 0.4
    # below suspicious → FAKE

# ---- Paths ----
paths:
  dataset_dir: "dataset"
  checkpoint_dir: "checkpoints"
  model_dir: "models"
  voiceprint_dir: "voiceprints"
  log_dir: "runs"
  export_dir: "models"

# ---- ONNX export ----
export:
  opset_version: 14
  spectrogram_input_shape: [1, 3, 128, 128]
  wav2vec_input_shape: [1, 32000]
  codec_input_shape: [1, 32000]

# ---- Dataset sources ----
datasets:
  asvspoof2019:
    url: "https://datashare.ed.ac.uk/bitstream/handle/10283/3336/LA.zip"
    name: "ASVspoof2019-LA"
  librispeech:
    url: "https://www.openslr.org/resources/12/dev-clean.tar.gz"
    name: "LibriSpeech-dev-clean"
